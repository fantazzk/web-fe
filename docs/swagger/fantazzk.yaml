openapi: 3.1.0
info:
  title: Fantazzk API
  description: |
    Fantazzk의 외부 웹 연동용 API 문서입니다.

    ## 빠른 사용 흐름
    1. `GET /api/v1/templates` 로 템플릿 목록을 조회합니다.
    2. `POST /api/v1/rooms` 또는 `POST /api/v1/rooms/{code}/join` 으로 방 세션을 시작합니다.
    3. 응답의 `teamLeaderSession.actionToken` 을 FE 세션 스토리지에 저장합니다.
    4. 로비 화면은 `GET /api/v1/rooms/{code}` 를 source of truth 로 사용합니다.
    5. `startedGameId` 가 생기면 진행 화면을 `GET /api/v1/games/{gameId}` 기반으로 전환합니다.
    6. 시작 후 드래프트/경매 액션은 모두 `games` API 로 호출합니다.

    ## 공통 응답 규칙
    - 성공 응답: `resultType=SUCCESS`, 실제 payload 는 `success` 에 들어갑니다.
    - 실패 응답: `resultType=ERROR`, 에러 정보는 `error.code`, `error.message`, `error.data` 에 들어갑니다.
    - validation 실패 시 `error.code` 는 `BAD_REQUEST` 이고, `error.data` 에 필드별 메시지가 들어갑니다.

    ## room 과 game 의 역할
    - `rooms` API 는 로비/대기방 조회와 시작 전 액션을 담당합니다.
    - `games` API 는 시작 후 실시간 진행 상태와 액션을 담당합니다.
    - 즉, 시작 전에는 `room`, 시작 후에는 `game` 이 화면의 source of truth 입니다.

    ## HTTP 와 realtime 의 역할
    - 이 OpenAPI 문서는 HTTP 계약만 설명합니다.
    - Supabase realtime payload 는 별도 내부 계약으로 관리하며, 여기에는 포함하지 않습니다.
    - 일부 mutation API 는 빈 성공 응답만 반환합니다. 이 경우 실제 화면 갱신은 realtime 이벤트 또는 `GET /rooms/{code}`, `GET /games/{gameId}` 재조회로 확인합니다.

    ## 액션 인증 방식
    - 로그인 토큰 대신 `X-Room-Action-Token` 헤더를 사용합니다.
    - 이 값은 방 생성/참가 응답에서만 내려오며, 이후 mutation API 호출 시 그대로 전달해야 합니다.
  version: v1
servers:
- url: http://127.0.0.1:8080
  description: Generated server url
tags:
- name: Template
  description: 템플릿 조회/생성 API. 웹에서 첫 진입 시 사용할 룰과 선수 풀을 확인합니다.
- name: Room Session
  description: 방 생성/참가 API. 성공 응답에서 `actionToken` 을 받아 이후 mutation 요청에 사용합니다.
- name: Room Lobby
  description: 대기방 로비 조회 및 시작 전 액션 API. `startedGameId` 가 생기면 Game Play API 로 전환합니다.
- name: Game Play
  description: 방 시작 후 진행 화면용 API. 시작 이후 상태의 source of truth 입니다.
paths:
  /api/v1/rooms/{code}/draft-position:
    put:
      tags:
      - Room Lobby
      summary: 드래프트 자리 선택 또는 변경
      description: "드래프트 모드 로비에서 현재 팀장의 드래프트 순번 선택 요청을 전달합니다. 성공 시에는 빈 성공 응답만 반환하며\
        , 로비 갱신은 realtime 이벤트나 GET /rooms/{code}로 확인합니다."
      operationId: selectDraftPosition
      parameters:
      - name: code
        in: path
        description: "사용자가 공유받은 방 코드입니다. 로비 조회와 참가, 시작 전 액션의 기준 식별자입니다."
        required: true
        schema:
          type: string
        example: ROOM01
      - name: X-Room-Action-Token
        in: header
        description: 방 생성 또는 참가 성공 응답의 `teamLeaderSession.actionToken` 값을 그대로 전달합니다.
          로그인 토큰이 아니라 방/팀장 단위의 액션 권한 토큰입니다.
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectDraftPositionRequest"
        required: true
      responses:
        "200":
          description: 자리 선택 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success: null
                error: null
        "401":
          description: 액션 토큰이 없거나 유효하지 않음
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_ACTION_TOKEN_REQUIRED
                  message: 방 액션 토큰이 필요합니다
                  data: null
        "409":
          description: 이미 선점된 자리이거나 대기 상태가 아님
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
      security:
      - roomActionToken: []
    delete:
      tags:
      - Room Lobby
      summary: 드래프트 자리 선택 취소
      description: "현재 팀장이 확정했던 드래프트 순번 해제 요청을 전달합니다. 성공 시에는 빈 성공 응답만 반환하며, 로비 갱신은\
        \ realtime 이벤트나 GET /rooms/{code}로 확인합니다."
      operationId: clearDraftPosition
      parameters:
      - name: code
        in: path
        description: "사용자가 공유받은 방 코드입니다. 로비 조회와 참가, 시작 전 액션의 기준 식별자입니다."
        required: true
        schema:
          type: string
        example: ROOM01
      - name: X-Room-Action-Token
        in: header
        description: 방 생성 또는 참가 성공 응답의 `teamLeaderSession.actionToken` 값을 그대로 전달합니다.
          로그인 토큰이 아니라 방/팀장 단위의 액션 권한 토큰입니다.
        required: false
        schema:
          type: string
      responses:
        "200":
          description: 자리 선택 취소 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success: null
                error: null
        "401":
          description: 액션 토큰이 없거나 유효하지 않음
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_ACTION_TOKEN_REQUIRED
                  message: 방 액션 토큰이 필요합니다
                  data: null
      security:
      - roomActionToken: []
  /api/v1/templates:
    get:
      tags:
      - Template
      summary: 템플릿 목록 조회
      description: 웹의 첫 진입 단계에서 사용 가능한 방 룰 목록을 조회합니다.
      operationId: list
      responses:
        "200":
          description: 템플릿 목록 조회 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success:
                - id: 11111111-1111-1111-1111-111111111111
                  name: LOL 2인 드래프트
                  gameType: LEAGUE_OF_LEGENDS
                  mode: DRAFT
                  teamCount: 2
                  teamSize: 3
                  budget: null
                  pickBanTime: 30
                  minBidUnit: null
                  draftOrderStrategy: SNAKE
                  players:
                  - name: 선수1
                    position: TOP
                    displayOrder: 0
                  - name: 선수2
                    position: JUNGLE
                    displayOrder: 1
                error: null
    post:
      tags:
      - Template
      summary: 템플릿 생성
      description: "방 생성에 사용할 템플릿을 등록합니다. 운영 중 FE가 직접 호출할 가능성보다, 관리/운영 도구에서 사용하는 성\
        격이 강합니다."
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
        required: true
      responses:
        "201":
          description: 템플릿 생성 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success:
                  id: 11111111-1111-1111-1111-111111111111
                  name: LOL 2인 드래프트
                  gameType: LEAGUE_OF_LEGENDS
                  mode: DRAFT
                  teamCount: 2
                  teamSize: 3
                  budget: null
                  pickBanTime: 30
                  minBidUnit: null
                  draftOrderStrategy: SNAKE
                  players:
                  - name: 선수1
                    position: TOP
                    displayOrder: 0
                  - name: 선수2
                    position: JUNGLE
                    displayOrder: 1
                error: null
  /api/v1/rooms:
    get:
      tags:
      - Room Lobby
      summary: 참가 가능한 방 목록 조회
      description: 웹 메인 화면에서 노출할 최신 대기방 목록을 조회합니다. 전체 목록이 아니라 참가 가능한 최신 방만 최대 5개 반환합니다.
      operationId: list_1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListJoinableRoomResponse"
    post:
      tags:
      - Room Session
      summary: 방 생성
      description: "템플릿을 기준으로 새 방을 만들고, 즉시 호스트 세션을 발급합니다. 응답의 `teamLeaderSession.actionToken`\
        \ 은 이후 모든 로비/게임 mutation 요청에 사용해야 합니다."
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
        required: true
      responses:
        "201":
          description: 방 생성 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success:
                  room:
                    roomCode: ROOM01
                    gameType: LEAGUE_OF_LEGENDS
                    status: WAITING
                    mode: DRAFT
                    teamCount: 2
                    teamSize: 3
                    budget: null
                    minBidUnit: null
                    draftOrderStrategy: SNAKE
                    startReadiness: WAITING_FOR_DRAFT_POSITIONS
                    startedGameId: null
                    draftOrder:
                      slots:
                      - draftPosition: 1
                        leaderId: leader-host
                        nickname: 호스트
                      - draftPosition: 2
                        leaderId: null
                        nickname: null
                    leaders:
                    - id: leader-host
                      nickname: 호스트
                      draftPosition: 1
                      remainingBudget: null
                    playerPool:
                    - name: 선수1
                      position: TOP
                      displayOrder: 0
                      status: AVAILABLE
                    - name: 선수2
                      position: JUNGLE
                      displayOrder: 1
                      status: AVAILABLE
                  teamLeaderSession:
                    leaderId: leader-host
                    role: HOST
                    actionToken: room-action-token
                error: null
        "400":
          description: 요청 validation 실패
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: BAD_REQUEST
                  message: 요청이 올바르지 않습니다
                  data:
                    hostNickname: 호스트 이름은 비어 있을 수 없습니다
        "404":
          description: 템플릿을 찾을 수 없음
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRoomCreateResponse"
  /api/v1/rooms/{code}/start:
    post:
      tags:
      - Room Lobby
      summary: 방 시작
      description: "호스트가 로비를 실제 게임으로 시작합니다. 성공 시 게임 진입에 필요한 최소 식별 정보를 반환하며, FE는 이후\
        \ `/games/{gameId}` 를 기준으로 진행 화면을 유지해야 합니다."
      operationId: start
      parameters:
      - name: code
        in: path
        description: "사용자가 공유받은 방 코드입니다. 로비 조회와 참가, 시작 전 액션의 기준 식별자입니다."
        required: true
        schema:
          type: string
        example: ROOM01
      - name: X-Room-Action-Token
        in: header
        description: 방 생성 또는 참가 성공 응답의 `teamLeaderSession.actionToken` 값을 그대로 전달합니다.
          로그인 토큰이 아니라 방/팀장 단위의 액션 권한 토큰입니다.
        required: false
        schema:
          type: string
      responses:
        "200":
          description: 방 시작 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success:
                  gameId: 00000000-0000-0000-0000-000000000201
                error: null
        "401":
          description: 액션 토큰이 없거나 유효하지 않음
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_ACTION_TOKEN_REQUIRED
                  message: 방 액션 토큰이 필요합니다
                  data: null
        "403":
          description: 호스트가 아닌 팀장이 시작을 시도함
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRoomStartResponse"
        "409":
          description: 팀장 수 또는 드래프트 자리 준비가 완료되지 않았거나 동시 수정 충돌이 발생함
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_CONCURRENT_MODIFICATION
                  message: 방 상태가 동시에 변경되었습니다. 최신 상태를 확인한 뒤 다시 시도해 주세요
                  data: null
      security:
      - roomActionToken: []
  /api/v1/rooms/{code}/join:
    post:
      tags:
      - Room Session
      summary: 방 참가
      description: "공유받은 방 코드로 로비에 참가하고, 참가자 세션을 발급합니다. 성공 시 반환되는 `actionToken` 을\
        \ 저장해야 이후 자리 선택, 픽, 입찰을 수행할 수 있습니다."
      operationId: join
      parameters:
      - name: code
        in: path
        description: "사용자가 공유받은 방 코드입니다. 로비 조회와 참가, 시작 전 액션의 기준 식별자입니다."
        required: true
        schema:
          type: string
        example: ROOM01
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomRequest"
        required: true
      responses:
        "200":
          description: 방 참가 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success:
                  room:
                    roomCode: ROOM01
                    gameType: LEAGUE_OF_LEGENDS
                    status: WAITING
                    mode: DRAFT
                    teamCount: 2
                    teamSize: 3
                    budget: null
                    minBidUnit: null
                    draftOrderStrategy: SNAKE
                    startReadiness: WAITING_FOR_DRAFT_POSITIONS
                    startedGameId: null
                    draftOrder:
                      slots:
                      - draftPosition: 1
                        leaderId: leader-host
                        nickname: 호스트
                      - draftPosition: 2
                        leaderId: null
                        nickname: null
                    leaders:
                    - id: leader-host
                      nickname: 호스트
                      draftPosition: 1
                      remainingBudget: null
                    - id: leader-guest
                      nickname: 게스트
                      draftPosition: null
                      remainingBudget: null
                    playerPool:
                    - name: 선수1
                      position: TOP
                      displayOrder: 0
                      status: AVAILABLE
                    - name: 선수2
                      position: JUNGLE
                      displayOrder: 1
                      status: AVAILABLE
                  teamLeaderSession:
                    leaderId: leader-guest
                    role: LEADER
                    actionToken: guest-room-action-token
                error: null
        "400":
          description: 요청 validation 실패
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: BAD_REQUEST
                  message: 요청이 올바르지 않습니다
                  data:
                    nickname: 닉네임은 비어 있을 수 없습니다
        "404":
          description: 방을 찾을 수 없음
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRoomJoinResponse"
        "409":
          description: 방이 가득 찼거나 닉네임이 중복됨
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_NICKNAME_ALREADY_TAKEN
                  message: 이미 사용 중인 닉네임입니다
                  data: null
  /api/v1/games/{gameId}/draft-picks:
    post:
      tags:
      - Game Play
      summary: 드래프트 픽
      description: "현재 턴인 팀장의 드래프트 선택 요청을 전달합니다. 성공 시에는 수락 여부만 빈 성공 응답으로 확인하며, 화면\
        \ 갱신과 다음 드래프트 진행 상태는 realtime 이벤트나 GET /games/{gameId}로 확인합니다."
      operationId: pickDraft
      parameters:
      - name: gameId
        in: path
        description: "방이 시작된 뒤 발급되는 게임 ID입니다. 진행 화면의 source of truth는 `/games/{gameId}`\
          \ 입니다."
        required: true
        schema:
          type: string
          format: uuid
        example: 00000000-0000-0000-0000-000000000202
      - name: X-Room-Action-Token
        in: header
        description: 방 생성 또는 참가 성공 응답의 `teamLeaderSession.actionToken` 값을 그대로 전달합니다.
          로그인 토큰이 아니라 방/팀장 단위의 액션 권한 토큰입니다.
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickDraftRequest"
        required: true
      responses:
        "200":
          description: 픽 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success: null
                error: null
        "401":
          description: 액션 토큰이 없거나 유효하지 않음
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_ACTION_TOKEN_REQUIRED
                  message: 방 액션 토큰이 필요합니다
                  data: null
        "409":
          description: 현재 턴이 아니거나 이미 선택된 선수를 픽하려고 시도함
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_PICK_OUT_OF_TURN
                  message: 현재 턴인 팀장만 픽할 수 있습니다
                  data: null
      security:
      - roomActionToken: []
  /api/v1/games/{gameId}/bids:
    post:
      tags:
      - Game Play
      summary: 경매 입찰
      description: "현재 경매 대상 선수에게 입찰 요청을 전달합니다. 성공 시에는 수락 여부만 빈 성공 응답으로 확인하며, 화면 갱\
        신과 최신 경매 진행 상태는 realtime 이벤트나 GET /games/{gameId}로 확인합니다."
      operationId: placeBid
      parameters:
      - name: gameId
        in: path
        description: "방이 시작된 뒤 발급되는 게임 ID입니다. 진행 화면의 source of truth는 `/games/{gameId}`\
          \ 입니다."
        required: true
        schema:
          type: string
          format: uuid
        example: 00000000-0000-0000-0000-000000000201
      - name: X-Room-Action-Token
        in: header
        description: 방 생성 또는 참가 성공 응답의 `teamLeaderSession.actionToken` 값을 그대로 전달합니다.
          로그인 토큰이 아니라 방/팀장 단위의 액션 권한 토큰입니다.
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBidRequest"
        required: true
      responses:
        "200":
          description: 입찰 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success: null
                error: null
        "400":
          description: "0 이하 금액, 예산 초과 등 잘못된 입찰"
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: BAD_REQUEST
                  message: 요청이 올바르지 않습니다
                  data:
                    amount: 입찰 금액은 1 이상이어야 합니다
        "401":
          description: 액션 토큰이 없거나 유효하지 않음
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_ACTION_TOKEN_REQUIRED
                  message: 방 액션 토큰이 필요합니다
                  data: null
        "409":
          description: 최고가/최소 증가폭/포지션 제한/동시 수정 충돌 등으로 입찰이 거부됨
          content:
            application/json:
              example:
                resultType: ERROR
                success: null
                error:
                  code: ROOM_BID_MIN_UNIT_NOT_MET
                  message: 최소 입찰 증가폭을 만족하는 금액만 입찰할 수 있습니다
                  data: null
      security:
      - roomActionToken: []
  /api/v1/templates/{id}:
    get:
      tags:
      - Template
      summary: 템플릿 상세 조회
      description: 방 생성 전에 특정 템플릿의 상세 규칙과 선수 풀을 확인합니다.
      operationId: getById
      parameters:
      - name: id
        in: path
        description: 조회할 템플릿 ID
        required: true
        schema:
          type: string
          format: uuid
        example: 11111111-1111-1111-1111-111111111111
      responses:
        "200":
          description: 템플릿 상세 조회 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success:
                  id: 11111111-1111-1111-1111-111111111111
                  name: LOL 2인 드래프트
                  gameType: LEAGUE_OF_LEGENDS
                  mode: DRAFT
                  teamCount: 2
                  teamSize: 3
                  budget: null
                  pickBanTime: 30
                  minBidUnit: null
                  draftOrderStrategy: SNAKE
                  players:
                  - name: 선수1
                    position: TOP
                    displayOrder: 0
                  - name: 선수2
                    position: JUNGLE
                    displayOrder: 1
                error: null
  /api/v1/rooms/{code}:
    get:
      tags:
      - Room Lobby
      summary: 로비 상태 조회
      description: "로비 화면의 source of truth 입니다. 방이 시작된 뒤에는 `startedGameId` 값을 보고 `/games/{gameId}`\
        \ 기반 화면으로 전환해야 합니다."
      operationId: getByCode
      parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: 로비 조회 성공
          content:
            application/json:
              example:
                resultType: SUCCESS
                success:
                  roomCode: ROOM01
                  gameType: LEAGUE_OF_LEGENDS
                  status: WAITING
                  mode: DRAFT
                  teamCount: 2
                  teamSize: 3
                  budget: null
                  minBidUnit: null
                  draftOrderStrategy: SNAKE
                  startReadiness: STARTABLE
                  startedGameId: null
                  draftOrder:
                    slots:
                    - draftPosition: 1
                      leaderId: leader-host
                      nickname: 호스트
                    - draftPosition: 2
                      leaderId: leader-guest
                      nickname: 게스트
                  leaders:
                  - id: leader-host
                    nickname: 호스트
                    draftPosition: 1
                    remainingBudget: null
                  - id: leader-guest
                    nickname: 게스트
                    draftPosition: 2
                    remainingBudget: null
                  playerPool:
                  - name: 선수1
                    position: TOP
                    displayOrder: 0
                    status: AVAILABLE
                  - name: 선수2
                    position: JUNGLE
                    displayOrder: 1
                    status: AVAILABLE
                error: null
        "404":
          description: 방을 찾을 수 없음
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRoomDetailResponse"
  /api/v1/games/{gameId}:
    get:
      tags:
      - Game Play
      summary: 게임 진행 상태 조회
      description: "방 시작 후 진행 화면의 source of truth 입니다. 드래프트/경매 상태, 참가자, 로스터, 현재 진행\
        \ 정보를 모두 이 API 기준으로 렌더링합니다."
      operationId: get
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: 게임 상태 조회 성공
          content:
            application/json:
              examples:
                draft:
                  description: draft
                  value:
                    resultType: SUCCESS
                    success:
                      gameId: 00000000-0000-0000-0000-000000000202
                      roomCode: ROOM01
                      gameType: LEAGUE_OF_LEGENDS
                      mode: DRAFT
                      status: IN_PROGRESS
                      teamCount: 2
                      teamSize: 3
                      budget: null
                      minBidUnit: null
                      draftOrderStrategy: SNAKE
                      participants:
                      - teamLeaderId: leader-host
                        nickname: 호스트
                        draftPosition: 1
                        remainingBudget: null
                      - teamLeaderId: leader-guest
                        nickname: 게스트
                        draftPosition: 2
                        remainingBudget: null
                      playerPool:
                      - name: 선수1
                        position: TOP
                        displayOrder: 0
                        status: ASSIGNED
                      - name: 선수2
                        position: JUNGLE
                        displayOrder: 1
                        status: AVAILABLE
                      roster:
                      - teamLeaderId: leader-host
                        playerName: 선수1
                        assignOrder: 0
                      draftProgress:
                        currentTurnIndex: 1
                        currentRound: 1
                        currentLeaderId: leader-guest
                        currentRoundLeaderIds:
                        - leader-host
                        - leader-guest
                      auctionProgress: null
                    error: null
                auction:
                  description: auction
                  value:
                    resultType: SUCCESS
                    success:
                      gameId: 00000000-0000-0000-0000-000000000201
                      roomCode: ROOM01
                      gameType: LEAGUE_OF_LEGENDS
                      mode: AUCTION
                      status: IN_PROGRESS
                      teamCount: 2
                      teamSize: 3
                      budget: 300
                      minBidUnit: 10
                      draftOrderStrategy: null
                      participants:
                      - teamLeaderId: leader-host
                        nickname: 호스트
                        draftPosition: null
                        remainingBudget: 300
                      - teamLeaderId: leader-guest
                        nickname: 게스트
                        draftPosition: null
                        remainingBudget: 200
                      playerPool:
                      - name: 선수1
                        position: TOP
                        displayOrder: 0
                        status: ASSIGNED
                      - name: 선수2
                        position: JUNGLE
                        displayOrder: 1
                        status: AVAILABLE
                      roster:
                      - teamLeaderId: leader-guest
                        playerName: 선수1
                        assignOrder: 0
                      draftProgress: null
                      auctionProgress:
                        currentRound: 2
                        currentAuctionRoundEndsAt: 2026-04-19T12:00:45Z
                        currentAuctionTarget:
                          name: 선수2
                          position: JUNGLE
                        highestBidAmount: 150
                        leadingLeaderId: leader-guest
                        bidCount: 2
                    error: null
        "404":
          description: 게임을 찾을 수 없음
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGameDetailResponse"
components:
  schemas:
    SelectDraftPositionRequest:
      type: object
      description: 드래프트 자리 선택 요청
      properties:
        draftPosition:
          type: integer
          format: int32
          description: 선택할 드래프트 순번. 1부터 teamCount 까지의 정수
          example: 2
      required:
      - draftPosition
    ApiResponseVoid:
      type: object
      description: "모든 API가 공통으로 사용하는 응답 envelope 입니다. 성공이면 `success`, 실패이면 `error`\
        \ 를 확인합니다."
      properties:
        resultType:
          type: string
          description: 응답 결과 타입
          enum:
          - SUCCESS
          - ERROR
        success:
          type: object
          description: 성공 응답 payload. 실패 시 null 입니다.
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: 실패 응답 정보. 성공 시 null 입니다.
    ErrorMessage:
      type: object
      description: 공통 에러 응답 payload
      properties:
        code:
          type: string
          description: 에러 코드
          example: ROOM_NOT_FOUND
        message:
          type: string
          description: 사용자 노출용 에러 메시지
          example: 방을 찾을 수 없습니다
        data:
          type: object
          description: 추가 진단 정보 또는 validation 필드 에러 맵. 없으면 null 입니다.
    CreateTemplateRequest:
      type: object
      description: 템플릿 생성 요청
      properties:
        name:
          type: string
          description: 템플릿 이름
          example: LOL 2인 드래프트
          minLength: 1
        gameType:
          type: string
          description: FE가 관리하는 게임 타입 메타데이터
          example: LEAGUE_OF_LEGENDS
        mode:
          type: string
          description: 템플릿 모드
          enum:
          - AUCTION
          - DRAFT
          example: DRAFT
        teamCount:
          type: integer
          format: int32
          description: 팀 수
          example: 2
        teamSize:
          type: integer
          format: int32
          description: 팀 전체 크기. 실제로 뽑아야 하는 선수 수는 `teamSize - 1` 입니다.
          example: 3
        pickBanTime:
          type: integer
          format: int32
          description: 턴 제한 시간(초)
          example: 30
        budget:
          type: integer
          format: int32
          description: 경매 모드에서만 사용되는 팀별 예산
          example: 300
        minBidUnit:
          type: integer
          format: int32
          description: 경매 모드에서만 사용되는 최소 입찰 증가 단위
          example: 10
        draftOrderStrategy:
          type: string
          description: 드래프트 모드에서만 사용되는 라운드 순서 전략
          enum:
          - SNAKE
          - FIXED
          example: SNAKE
        players:
          type: array
          description: 선수 풀 목록. 길이는 정확히 `teamCount * (teamSize - 1)` 이어야 합니다.
          items:
            $ref: "#/components/schemas/PlayerRequest"
          minItems: 1
      required:
      - mode
    PlayerRequest:
      type: object
      description: 템플릿 선수 입력
      properties:
        name:
          type: string
          description: 선수 이름
          example: 선수1
          minLength: 1
        position:
          type: string
          description: FE가 관리하는 선수 포지션 메타데이터
          example: TOP
    CreateRoomRequest:
      type: object
      description: 방 생성 요청
      properties:
        templateId:
          type: string
          format: uuid
          description: 방 생성에 사용할 템플릿 ID
          example: 11111111-1111-1111-1111-111111111111
        hostNickname:
          type: string
          description: 호스트 닉네임
          example: 호스트
          minLength: 1
      required:
      - hostNickname
      - templateId
    ApiResponseRoomCreateResponse:
      type: object
      description: "모든 API가 공통으로 사용하는 응답 envelope 입니다. 성공이면 `success`, 실패이면 `error`\
        \ 를 확인합니다."
      properties:
        resultType:
          type: string
          description: 응답 결과 타입
          enum:
          - SUCCESS
          - ERROR
        success:
          $ref: "#/components/schemas/RoomCreateResponse"
          description: 성공 응답 payload. 실패 시 null 입니다.
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: 실패 응답 정보. 성공 시 null 입니다.
    DraftOrderPreviewResponse:
      type: object
      description: 드래프트 로비 자리 현황
      properties:
        slots:
          type: array
          items:
            $ref: "#/components/schemas/DraftOrderSlotResponse"
    DraftOrderSlotResponse:
      type: object
      description: 드래프트 순번별 배정 현황
      properties:
        draftPosition:
          type: integer
          format: int32
          description: 드래프트 순번
          example: 1
        leaderId:
          type: string
          description: 이 순번을 점유한 팀장 ID. 비어 있으면 null
          example: leader-host
        nickname:
          type: string
          description: 이 순번을 점유한 닉네임. 비어 있으면 null
          example: 호스트
    RoomCreateResponse:
      type: object
      properties:
        room:
          $ref: "#/components/schemas/RoomDetailResponse"
        teamLeaderSession:
          $ref: "#/components/schemas/TeamLeaderSessionResponse"
    RoomDetailResponse:
      type: object
      description: 로비 화면의 source of truth
      properties:
        roomCode:
          type: string
          description: 방 코드
          example: ROOM01
        gameType:
          type: string
          description: FE가 관리하는 게임 타입 메타데이터
          example: LEAGUE_OF_LEGENDS
        status:
          type: string
          description: 방 상태
          enum:
          - WAITING
          - STARTED
          example: WAITING
        mode:
          type: string
          description: 게임 모드
          enum:
          - DRAFT
          - AUCTION
          example: DRAFT
        teamCount:
          type: integer
          format: int32
          description: 총 팀 수
          example: 2
        teamSize:
          type: integer
          format: int32
          description: 팀 전체 크기
          example: 3
        budget:
          type: integer
          format: int32
          description: 경매 예산
          example: 300
        minBidUnit:
          type: integer
          format: int32
          description: 최소 입찰 증가 단위
          example: 10
        draftOrderStrategy:
          type: string
          description: 드래프트 순서 전략
          enum:
          - SNAKE
          - FIXED
          example: SNAKE
        startReadiness:
          type: string
          description: 로비 기준 시작 가능 상태. FE는 이 값을 그대로 시작 버튼 활성화/안내 문구에 활용하면 됩니다.
          enum:
          - WAITING_FOR_LEADERS
          - WAITING_FOR_DRAFT_POSITIONS
          - STARTABLE
          - NOT_WAITING
          example: STARTABLE
        startedGameId:
          type: string
          description: "방이 시작되면 채워지는 게임 ID. 값이 생기면 FE는 `/games/{gameId}` 기반 진행 화면으\
            로 전환해야 합니다."
          example: 00000000-0000-0000-0000-000000000201
        draftOrder:
          $ref: "#/components/schemas/DraftOrderPreviewResponse"
          description: 드래프트 로비에서만 제공되는 자리 현황
        leaders:
          type: array
          description: 참가한 팀장 목록
          items:
            $ref: "#/components/schemas/TeamLeaderResponse"
        playerPool:
          type: array
          description: 로비에서 보여줄 선수 풀
          items:
            $ref: "#/components/schemas/RoomPlayerResponse"
    RoomPlayerResponse:
      type: object
      description: 로비에 노출되는 선수 정보
      properties:
        name:
          type: string
          description: 선수 이름
          example: 선수1
        position:
          type: string
          description: FE가 관리하는 선수 포지션 메타데이터
          example: TOP
        displayOrder:
          type: integer
          format: int32
          description: 노출 순서
          example: 0
        status:
          type: string
          description: 배정 상태
          enum:
          - AVAILABLE
          - ASSIGNED
          example: AVAILABLE
    TeamLeaderResponse:
      type: object
      description: 로비 또는 게임에 참가한 팀장 정보
      properties:
        id:
          type: string
          description: 팀장 ID
          example: leader-host
        nickname:
          type: string
          description: 닉네임
          example: 호스트
        draftPosition:
          type: integer
          format: int32
          description: 드래프트 순번. 경매 모드에서는 null
          example: 1
        remainingBudget:
          type: integer
          format: int32
          description: 남은 예산. 드래프트 모드에서는 null
          example: 300
    TeamLeaderSessionResponse:
      type: object
      description: 현재 사용자에게 발급된 방 세션 정보
      properties:
        leaderId:
          type: string
          description: 현재 사용자 팀장 ID
          example: leader-host
        role:
          type: string
          description: 현재 사용자 역할. HOST 만 방 시작 권한을 가집니다.
          enum:
          - HOST
          - LEADER
          example: HOST
        actionToken:
          type: string
          description: 이후 모든 mutation 요청의 `X-Room-Action-Token` 헤더에 넣어야 하는 값입니다. 로그인
            토큰이 아니라 방 액션 전용 토큰입니다.
          example: room-action-token
    ApiResponseRoomStartResponse:
      type: object
      description: "모든 API가 공통으로 사용하는 응답 envelope 입니다. 성공이면 `success`, 실패이면 `error`\
        \ 를 확인합니다."
      properties:
        resultType:
          type: string
          description: 응답 결과 타입
          enum:
          - SUCCESS
          - ERROR
        success:
          $ref: "#/components/schemas/RoomStartResponse"
          description: 성공 응답 payload. 실패 시 null 입니다.
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: 실패 응답 정보. 성공 시 null 입니다.
    RoomStartResponse:
      type: object
      properties:
        gameId:
          type: string
    JoinRoomRequest:
      type: object
      description: 방 참가 요청
      properties:
        nickname:
          type: string
          description: 참가자 닉네임
          example: 게스트
          minLength: 1
      required:
      - nickname
    ApiResponseRoomJoinResponse:
      type: object
      description: "모든 API가 공통으로 사용하는 응답 envelope 입니다. 성공이면 `success`, 실패이면 `error`\
        \ 를 확인합니다."
      properties:
        resultType:
          type: string
          description: 응답 결과 타입
          enum:
          - SUCCESS
          - ERROR
        success:
          $ref: "#/components/schemas/RoomJoinResponse"
          description: 성공 응답 payload. 실패 시 null 입니다.
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: 실패 응답 정보. 성공 시 null 입니다.
    RoomJoinResponse:
      type: object
      properties:
        room:
          $ref: "#/components/schemas/RoomDetailResponse"
        teamLeaderSession:
          $ref: "#/components/schemas/TeamLeaderSessionResponse"
    PickDraftRequest:
      type: object
      description: 드래프트 픽 요청
      properties:
        playerName:
          type: string
          description: 선택할 선수 이름. `GameResponse.players` 의 사용 가능한 이름 중 하나여야 합니다.
          example: 선수3
          minLength: 1
      required:
      - playerName
    PlaceBidRequest:
      type: object
      description: 경매 입찰 요청
      properties:
        amount:
          type: integer
          format: int32
          description: 입찰 금액. 현재 최고가보다 높고 최소 증가폭을 만족해야 합니다.
          example: 150
      required:
      - amount
    ApiResponseListJoinableRoomResponse:
      type: object
      description: "모든 API가 공통으로 사용하는 응답 envelope 입니다. 성공이면 `success`, 실패이면 `error`\
        \ 를 확인합니다."
      properties:
        resultType:
          type: string
          description: 응답 결과 타입
          enum:
          - SUCCESS
          - ERROR
        success:
          type: array
          description: 성공 응답 payload. 실패 시 null 입니다.
          items:
            $ref: "#/components/schemas/JoinableRoomResponse"
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: 실패 응답 정보. 성공 시 null 입니다.
    JoinableRoomResponse:
      type: object
      description: 메인 화면에서 보여주는 참가 가능한 방 요약
      properties:
        code:
          type: string
          description: 방 코드
          example: ROOM01
        gameType:
          type: string
          description: FE가 관리하는 게임 타입 메타데이터
          example: LEAGUE_OF_LEGENDS
        mode:
          type: string
          description: 게임 모드
          enum:
          - DRAFT
          - AUCTION
          example: DRAFT
        teamCount:
          type: integer
          format: int32
          description: 총 팀 수
          example: 2
        joinedLeaderCount:
          type: integer
          format: int32
          description: 현재 참가한 팀장 수
          example: 1
        remainingSlotCount:
          type: integer
          format: int32
          description: 남은 팀장 자리 수
          example: 1
        startReadiness:
          type: string
          description: 시작 가능 여부 요약
          enum:
          - WAITING_FOR_LEADERS
          - WAITING_FOR_DRAFT_POSITIONS
          - STARTABLE
          - NOT_WAITING
          example: WAITING_FOR_DRAFT_POSITIONS
    ApiResponseRoomDetailResponse:
      type: object
      description: "모든 API가 공통으로 사용하는 응답 envelope 입니다. 성공이면 `success`, 실패이면 `error`\
        \ 를 확인합니다."
      properties:
        resultType:
          type: string
          description: 응답 결과 타입
          enum:
          - SUCCESS
          - ERROR
        success:
          $ref: "#/components/schemas/RoomDetailResponse"
          description: 성공 응답 payload. 실패 시 null 입니다.
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: 실패 응답 정보. 성공 시 null 입니다.
    ApiResponseGameDetailResponse:
      type: object
      description: "모든 API가 공통으로 사용하는 응답 envelope 입니다. 성공이면 `success`, 실패이면 `error`\
        \ 를 확인합니다."
      properties:
        resultType:
          type: string
          description: 응답 결과 타입
          enum:
          - SUCCESS
          - ERROR
        success:
          $ref: "#/components/schemas/GameDetailResponse"
          description: 성공 응답 payload. 실패 시 null 입니다.
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: 실패 응답 정보. 성공 시 null 입니다.
    AuctionProgressResponse:
      type: object
      properties:
        currentRound:
          type: integer
          format: int32
        currentAuctionRoundEndsAt:
          type: string
          format: date-time
        currentAuctionTarget:
          $ref: "#/components/schemas/AuctionTargetResponse"
        highestBidAmount:
          type: integer
          format: int32
        leadingLeaderId:
          type: string
        bidCount:
          type: integer
          format: int32
    AuctionTargetResponse:
      type: object
      description: 현재 경매 대상 선수
      properties:
        name:
          type: string
          description: 선수 이름
          example: 선수2
        position:
          type: string
          description: FE가 관리하는 선수 포지션 메타데이터
          example: JUNGLE
    DraftProgressResponse:
      type: object
      properties:
        currentTurnIndex:
          type: integer
          format: int32
        currentRound:
          type: integer
          format: int32
        currentLeaderId:
          type: string
        currentRoundLeaderIds:
          type: array
          items:
            type: string
    GameDetailResponse:
      type: object
      description: 진행 화면의 source of truth
      properties:
        gameId:
          type: string
          description: 게임 ID
          example: 00000000-0000-0000-0000-000000000201
        roomCode:
          type: string
          description: 원본 방 코드
          example: ROOM01
        gameType:
          type: string
          description: FE가 관리하는 게임 타입 메타데이터
          example: LEAGUE_OF_LEGENDS
        mode:
          type: string
          description: 게임 모드
          enum:
          - DRAFT
          - AUCTION
          example: AUCTION
        status:
          type: string
          description: 게임 상태
          enum:
          - IN_PROGRESS
          - COMPLETED
          example: IN_PROGRESS
        teamCount:
          type: integer
          format: int32
          description: 총 팀 수
          example: 2
        teamSize:
          type: integer
          format: int32
          description: 팀 전체 크기
          example: 3
        budget:
          type: integer
          format: int32
          description: 경매 예산
          example: 300
        minBidUnit:
          type: integer
          format: int32
          description: 최소 입찰 증가 단위
          example: 10
        draftOrderStrategy:
          type: string
          description: 드래프트 순서 전략
          enum:
          - SNAKE
          - FIXED
          example: SNAKE
        participants:
          type: array
          description: 참가 팀장 목록
          items:
            $ref: "#/components/schemas/GameParticipantResponse"
        playerPool:
          type: array
          description: "선수 풀. 드래프트에서는 원래 displayOrder, 경매에서는 현재 경매 순서 기준으로 정렬됩니다."
          items:
            $ref: "#/components/schemas/GamePlayerResponse"
        roster:
          type: array
          description: 지금까지 확정된 멤버 목록
          items:
            $ref: "#/components/schemas/GameMemberResponse"
        draftProgress:
          $ref: "#/components/schemas/DraftProgressResponse"
          description: 드래프트 게임 현재 진행 정보
        auctionProgress:
          $ref: "#/components/schemas/AuctionProgressResponse"
          description: 경매 게임 현재 진행 정보
    GameMemberResponse:
      type: object
      description: 확정된 팀 편성 결과
      properties:
        teamLeaderId:
          type: string
          description: 선수를 배정받은 팀장 ID
          example: leader-host
        playerName:
          type: string
          description: 배정된 선수 이름
          example: 선수1
        assignOrder:
          type: integer
          format: int32
          description: 배정 순서
          example: 0
    GameParticipantResponse:
      type: object
      description: 게임 참여 팀장 정보
      properties:
        teamLeaderId:
          type: string
          description: 팀장 ID
          example: leader-host
        nickname:
          type: string
          description: 닉네임
          example: 호스트
        draftPosition:
          type: integer
          format: int32
          description: 드래프트 순번. 경매 모드에서는 null
          example: 1
        remainingBudget:
          type: integer
          format: int32
          description: 남은 예산. 드래프트 모드에서는 null
          example: 300
    GamePlayerResponse:
      type: object
      description: 진행 화면에 노출되는 선수 정보
      properties:
        name:
          type: string
          description: 선수 이름
          example: 선수1
        position:
          type: string
          description: FE가 관리하는 선수 포지션 메타데이터
          example: TOP
        displayOrder:
          type: integer
          format: int32
          description: "노출 순서. 경매 모드에서는 현재 경매 순서, 드래프트 모드에서는 원래 displayOrder 입니다."
          example: 0
        status:
          type: string
          description: 현재 배정 여부
          enum:
          - AVAILABLE
          - ASSIGNED
          example: AVAILABLE
  securitySchemes:
    roomActionToken:
      type: apiKey
      description: 방 생성 또는 참가 성공 응답의 `teamLeaderSession.actionToken` 값을 그대로 전달합니다.
        로그인 토큰이 아니라 방/팀장 단위의 액션 권한 토큰입니다.
      name: X-Room-Action-Token
      in: header
